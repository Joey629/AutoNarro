# 生产试点 — 绑定本机 127.0.0.1，由 Nginx / Cloudflare Tunnel 对外
services:
  narro:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
      - ./configs:/app/configs:ro
    environment:
      - PORT=8000
      - NARRO_REQUIRE_API_KEY=${NARRO_REQUIRE_API_KEY:-1}
      - NARRO_API_KEY=${NARRO_API_KEY:?set NARRO_API_KEY}
      - NARRO_HTTPS=${NARRO_HTTPS:-1}
      - NARRO_MODEL_VERSION=${NARRO_MODEL_VERSION:-narro_v4}
      - NARRO_BART_FORCE_CPU=${NARRO_BART_FORCE_CPU:-1}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    restart: unless-stopped
